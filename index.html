<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Калькулятор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: sans-serif;
    background: #f9f9f9;
    display: flex;
    justify-content: center;
    padding: 20px 0;
}

.container {
    width: 90%;
    max-width: 400px;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

.percent-buttons {
    display: flex;
    gap: 6px;
}

.percent-buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #e0e0e0;
}

.percent-buttons button.active {
    background: #007bff;
    color: white;
}

button.calculate {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
}

/* История */
.history {
    margin-top: 20px;
}

.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.nav button {
    padding: 6px 10px;
}

.history-item {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 8px;
    border-radius: 6px;
    margin-top: 5px;
    font-size: 13px;
}

.delete-btn {
    border: none;
    background: transparent;
    color: red;
    cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

<h2>Калькулятор</h2>

<input id="k" placeholder="Введите квадратуру" type="number">
<input id="p" placeholder="Введите площадь" type="number">

<div class="percent-buttons">
    <button onclick="setPercent(5)" id="p5">5%</button>
    <button onclick="setPercent(7)" id="p7">7%</button>
    <button onclick="setPercent(10)" id="p10">10%</button>
    <button onclick="setPercent(15)" id="p15">15%</button>
</div>

<button class="calculate" onclick="calc()">Рассчитать</button>

<div id="result"></div>

<div class="history">

<div class="nav">
    <button onclick="prevDate()">◀</button>
    <span id="currentDate"></span>
    <button onclick="nextDate()">▶</button>
</div>

<div id="historyList"></div>

<div class="nav">
    <button onclick="prevPage()">←</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">→</button>
</div>

</div>

</div>

<script>

// ===== НАСТРОЙКИ =====
const MAX_HISTORY = 200;
const TTL_DAYS = 14;
const PER_PAGE = 10;

let percent = 5;
let history = JSON.parse(localStorage.getItem("history")) || [];

let currentDateIndex = 0;
let currentPage = 0;

function setPercent(v){
    percent = v;
    document.querySelectorAll(".percent-buttons button")
        .forEach(b=>b.classList.remove("active"));
    document.getElementById("p"+v).classList.add("active");
}
setPercent(5);

// ===== CLEANUP =====
function cleanup(){
    let now = Date.now();
    let limit = TTL_DAYS*86400000;
    history = history.filter(i => now - i.time < limit);
}

// ===== CALC =====
function calc(){
    let k = parseFloat(kEl.value);
    let p = parseFloat(pEl.value);

    if(!isNaN(k) && !isNaN(p) && p!=0){

        cleanup();

        let r = (k*(1+percent/100))/p;

        history.unshift({
            id: Date.now()+Math.random(),
            k,p,percent,
            result:r.toFixed(4),
            time:Date.now()
        });

        if(history.length>MAX_HISTORY){
            history = history.slice(0,MAX_HISTORY);
        }

        localStorage.setItem("history",JSON.stringify(history));

        currentPage = 0;
        currentDateIndex = 0;

        render();

        result.innerText = "Результат: "+r.toFixed(4);
    }
}

// ===== ГРУППИРОВКА =====
function getGroups(){
    let groups = {};
    history.forEach(i=>{
        let d = new Date(i.time).toLocaleDateString();
        if(!groups[d]) groups[d]=[];
        groups[d].push(i);
    });
    return Object.entries(groups);
}

// ===== RENDER =====
function render(){
    cleanup();

    let groups = getGroups();

    if(groups.length===0) return;

    let [date, items] = groups[currentDateIndex];

    document.getElementById("currentDate").innerText = date;

    let totalPages = Math.ceil(items.length/PER_PAGE);

    if(currentPage>=totalPages) currentPage=0;

    let start = currentPage*PER_PAGE;
    let pageItems = items.slice(start,start+PER_PAGE);

    let list = document.getElementById("historyList");
    list.innerHTML="";

    pageItems.forEach(item=>{
        let div = document.createElement("div");
        div.className="history-item";

        let time = new Date(item.time).toLocaleTimeString();

        div.innerHTML = `
            ${time} | K:${item.k} P:${item.p} ${item.percent}% → ${item.result}
            <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>
        `;

        list.appendChild(div);
    });

    document.getElementById("pageInfo").innerText =
        `${currentPage+1}/${totalPages}`;

    localStorage.setItem("history",JSON.stringify(history));
}

// ===== NAV =====
function prevDate(){
    let groups = getGroups();
    if(currentDateIndex>0){
        currentDateIndex--;
        currentPage=0;
        render();
    }
}

function nextDate(){
    let groups = getGroups();
    if(currentDateIndex<groups.length-1){
        currentDateIndex++;
        currentPage=0;
        render();
    }
}

function prevPage(){
    if(currentPage>0){
        currentPage--;
        render();
    }
}

function nextPage(){
    currentPage++;
    render();
}

// ===== DELETE =====
function deleteItem(id){
    history = history.filter(i=>i.id!=id);
    render();
}

// ===== INIT =====
const kEl = document.getElementById("k");
const pEl = document.getElementById("p");
const result = document.getElementById("result");

render();

</script>

</body>
</html>
